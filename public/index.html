<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Billu - Multiplayer Billiards</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Auth Screen -->
        <div id="auth-screen" class="screen">
            <div class="card shadow-lg">
                <h1 class="logo-title">🎱 Billu</h1>
                <p class="subtitle">A Playful Billiards Experience</p>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="signup">Sign Up</button>
                </div>
                <form id="login-form" class="auth-form active">
                    <input type="text" id="login-user" placeholder="Username" required>
                    <input type="password" id="login-pass" placeholder="Password" required>
                    <div id="auth-error-login" class="error-msg"></div>
                    <button type="submit" class="btn-primary">Play Now</button>
                </form>
                <form id="signup-form" class="auth-form">
                    <input type="text" id="signup-user" placeholder="Username" required>
                    <input type="password" id="signup-pass" placeholder="Password" required>
                    <div id="auth-error-signup" class="error-msg"></div>
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
            </div>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="screen">
            <div class="header-bar shadow-sm">
                <div class="user-pill">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> 
                    <span id="username-display"></span>
                </div>
            </div>
            <div class="menu-container">
                <h2 class="menu-title">Main Menu</h2>
                <div class="btn-grid">
                    <button id="host-btn" class="btn-block btn-blue">Host Private Game</button>
                    <button id="join-btn" class="btn-block btn-green">Join Game</button>
                    <button id="ai-btn" class="btn-block btn-purple">Play vs AI</button>
                    <button id="groups-btn" class="btn-block btn-orange">Groups/Clans</button>
                </div>
            </div>
            
            <!-- Modals within Lobby -->
            <div id="join-modal" class="modal hidden">
                <div class="modal-content shadow-lg text-center">
                    <h3>Enter Room Code</h3>
                    <input type="text" id="join-code-input" placeholder="e.g. ABCD" maxlength="6">
                    <div id="join-error" class="error-msg"></div>
                    <div class="modal-actions">
                        <button id="join-cancel" class="btn-outline">Cancel</button>
                        <button id="join-submit" class="btn-primary">Join</button>
                    </div>
                </div>
            </div>

            <div id="ai-menu" class="modal hidden">
                <div class="modal-content shadow-lg text-center">
                    <h3>Select Difficulty</h3>
                    <button class="diff-btn btn-block btn-green" data-diff="easy">Easy (Casual)</button>
                    <button class="diff-btn btn-block btn-orange" data-diff="medium">Medium (Pro)</button>
                    <button class="diff-btn btn-block btn-red" data-diff="hard">Hard (Shark)</button>
                    <button id="ai-cancel" class="btn-outline mt-10">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Room Screen (Waiting) -->
        <div id="room-screen" class="screen">
            <div class="card shadow-lg text-center">
                <h2>Waiting for Player...</h2>
                <p>Share this code with your friend:</p>
                <div id="room-code-display" class="room-code">----</div>
                <button id="exit-room-btn" class="btn-outline mt-10">Cancel</button>
            </div>
        </div>

        <!-- Group Screen -->
        <div id="group-screen" class="screen">
            <div class="header-bar shadow-sm">
                <button id="groups-back" class="btn-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
                <h2>Groups</h2>
            </div>
            <div class="group-controls">
                <input type="text" id="new-group-name" placeholder="Group Name">
                <button id="create-group-btn" class="btn-primary flex-shrink">Create</button>
            </div>
            <div class="group-controls">
                <input type="text" id="join-group-id" placeholder="Group ID">
                <button id="join-group-btn" class="btn-secondary flex-shrink">Join</button>
            </div>
            <div id="group-list" class="scroll-list"></div>
        </div>

        <!-- Game Screen (Playful Bright UI Overlay over Canvas) -->
        <div id="game-screen" class="screen">
            <!-- Phaser Target -->
            <div id="game-container"></div>
            
            <div id="game-ui-overlay">
                <!-- Top Score HUD -->
                <div class="hud-top shadow-lg">
                    <div class="player-hud" id="p1-info">
                        <div class="avatar bg-blue">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <div class="hud-details">
                            <span class="p-name" id="p1-name">P1</span>
                            <div class="ball-dots" id="p1-dots"></div>
                        </div>
                    </div>
                    
                    <div id="turn-indicator" class="turn-arrow">
                        <svg viewBox="0 0 24 24" fill="var(--color-primary)"><path d="M12 21l-9-9h18z"/></svg>
                    </div>
                    
                    <div class="player-hud reverse" id="p2-info">
                        <div class="hud-details align-right">
                            <span class="p-name" id="p2-name">P2</span>
                            <div class="ball-dots" id="p2-dots"></div>
                        </div>
                        <div class="avatar bg-red">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                    </div>
                </div>

                <!-- Bottom Controls HUD -->
                <div class="hud-bottom shadow-lg">
                    <button id="exit-game-btn" class="hud-btn bg-red-light">
                        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    </button>
                    
                    <div class="ping-pill">Ping: <span id="ping-val">--</span>ms</div>
                    
                    <button id="mute-game-btn" class="hud-btn">
                        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19 12h.01 M16 9h.01 M16 15h.01 M22 9h.01 M22 15h.01"/></svg>
                    </button>
                    
                    <button id="fullscreen-btn" class="hud-btn">
                        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M3 16v3a2 2 0 002 2h3"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Game Over Overlay -->
            <div id="gameover-overlay" class="modal hidden">
                <div class="modal-content shadow-lg text-center bounce-in">
                    <h1 id="gameover-title" class="victory-title">You Win!</h1>
                    <p id="gameover-reason" class="victory-reason">Opponent scratched on 8-ball.</p>
                    <button id="gameover-lobby" class="btn-primary mt-10">Back to Menu</button>
                </div>
            </div>
        </div>

        <!-- Global Toast -->
        <div id="invite-toast" class="toast hidden shadow-lg">
            <p id="invite-msg">Invite received!</p>
            <div class="modal-actions">
                <button id="invite-decline" class="btn-outline">Decline</button>
                <button id="invite-accept" class="btn-primary">Accept</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
