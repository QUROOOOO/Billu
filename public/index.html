<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Billu - Real-time multiplayer 8-ball billiards game">
    <title>Billu - 8-Ball Pool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
        <div class="auth-wrapper">
            <div class="logo-area">
                <svg class="logo-icon" viewBox="0 0 64 64" width="72" height="72">
                    <circle cx="32" cy="32" r="30" fill="#7C3AED"/>
                    <circle cx="32" cy="32" r="22" fill="#1E1B4B" stroke="#A78BFA" stroke-width="2"/>
                    <circle cx="32" cy="32" r="9" fill="#F5F5F5"/>
                    <text x="32" y="36" text-anchor="middle" fill="#1E1B4B" font-size="13" font-weight="800" font-family="Nunito,sans-serif">8</text>
                </svg>
                <h1 class="logo-text">Billu</h1>
            </div>
            <p class="tagline">Multiplayer 8-Ball Pool</p>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <form id="login-form" class="auth-form active" autocomplete="off">
                <input type="text" id="login-user" placeholder="Username" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Enter</button>
            </form>

            <form id="signup-form" class="auth-form" autocomplete="off">
                <input type="text" id="signup-user" placeholder="Choose a username" required>
                <input type="password" id="signup-pass" placeholder="Choose a password" required>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen">
        <div class="lobby-wrapper">
            <h2 class="welcome-text">Hey, <span id="username-display"></span>!</h2>
            <div class="lobby-actions">

                <!-- Host Game -->
                <button id="host-btn" class="menu-card card-purple">
                    <svg viewBox="0 0 40 40" width="36" height="36" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
                        <circle cx="20" cy="20" r="14"/>
                        <circle cx="20" cy="20" r="5"/>
                        <line x1="20" y1="6" x2="20" y2="2"/>
                        <line x1="20" y1="38" x2="20" y2="34"/>
                    </svg>
                    <span>Host Game</span>
                </button>

                <!-- Join Game -->
                <button id="join-btn" class="menu-card card-blue">
                    <svg viewBox="0 0 40 40" width="36" height="36" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
                        <path d="M12 20a6 6 0 0 1 6-6 6 6 0 0 1 3.5 1.1"/>
                        <path d="M28 20a6 6 0 0 0-6 6 6 6 0 0 0-3.5-1.1"/>
                        <circle cx="12" cy="14" r="2.5"/>
                        <circle cx="28" cy="26" r="2.5"/>
                    </svg>
                    <span>Join Game</span>
                </button>

                <!-- Play vs AI -->
                <button id="ai-btn" class="menu-card card-orange">
                    <svg viewBox="0 0 40 40" width="36" height="36" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="8" y="10" width="24" height="18" rx="4"/>
                        <circle cx="16" cy="19" r="2.5"/>
                        <circle cx="24" cy="19" r="2.5"/>
                        <path d="M15 24h10"/>
                        <line x1="14" y1="10" x2="12" y2="5"/>
                        <line x1="26" y1="10" x2="28" y2="5"/>
                        <circle cx="12" cy="4" r="1.5"/>
                        <circle cx="28" cy="4" r="1.5"/>
                    </svg>
                    <span>Play vs AI</span>
                </button>

                <!-- Groups -->
                <button id="groups-btn" class="menu-card card-green">
                    <svg viewBox="0 0 40 40" width="36" height="36" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
                        <circle cx="20" cy="12" r="5"/>
                        <path d="M10 32c0-5.5 4.5-10 10-10s10 4.5 10 10"/>
                        <circle cx="32" cy="16" r="3.5"/>
                        <path d="M36 32c0-3.6-2-6.7-5-8.2"/>
                        <circle cx="8" cy="16" r="3.5"/>
                        <path d="M4 32c0-3.6 2-6.7 5-8.2"/>
                    </svg>
                    <span>Groups</span>
                </button>
            </div>
        </div>

        <!-- AI Difficulty Sub-Menu -->
        <div id="ai-menu" class="modal hidden">
            <div class="modal-card">
                <h3>Choose Difficulty</h3>
                <div class="difficulty-options">
                    <button class="diff-btn diff-easy" data-diff="easy">
                        <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"><circle cx="16" cy="16" r="12"/><path d="M11 14h2M19 14h2M11 20c2 2 8 2 10 0"/></svg>
                        Easy
                    </button>
                    <button class="diff-btn diff-medium" data-diff="medium">
                        <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"><circle cx="16" cy="16" r="12"/><path d="M11 14h2M19 14h2M11 20h10"/></svg>
                        Medium
                    </button>
                    <button class="diff-btn diff-hard" data-diff="hard">
                        <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"><circle cx="16" cy="16" r="12"/><path d="M11 14h2M19 14h2M11 20c2-2 8-2 10 0"/></svg>
                        Hard
                    </button>
                </div>
                <button id="ai-cancel" class="btn-secondary">Cancel</button>
            </div>
        </div>

        <!-- Join Modal -->
        <div id="join-modal" class="modal hidden">
            <div class="modal-card">
                <h3>Enter Room Code</h3>
                <input type="text" id="join-code-input" placeholder="ABC123" maxlength="6">
                <div class="modal-actions">
                    <button id="join-submit" class="btn-primary">Join</button>
                    <button id="join-cancel" class="btn-secondary">Cancel</button>
                </div>
                <p id="join-error" class="error-msg"></p>
            </div>
        </div>
    </div>

    <!-- GROUPS SCREEN -->
    <div id="group-screen" class="screen">
        <div class="groups-wrapper">
            <div class="groups-header">
                <button id="groups-back" class="btn-secondary">Back</button>
                <h2>Your Groups</h2>
            </div>
            <div id="group-list"></div>
            <div class="create-group-row">
                <input type="text" id="new-group-name" placeholder="New group name">
                <button id="create-group-btn" class="btn-primary btn-sm">Create</button>
            </div>
            <div class="create-group-row">
                <input type="text" id="join-group-id" placeholder="Group ID to join">
                <button id="join-group-btn" class="btn-primary btn-sm">Join</button>
            </div>
        </div>
    </div>

    <!-- ROOM WAITING -->
    <div id="room-screen" class="screen">
        <div class="room-wrapper">
            <h2>Room Code</h2>
            <div id="room-code-display" class="room-code"></div>
            <p class="room-hint">Share this code with your opponent</p>
            <div class="waiting-spinner"></div>
            <p class="waiting-text">Waiting for opponent...</p>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div id="game-container"></div>
        
        <div id="game-ui-overlay">
            <div class="score-card shadow-lg">
                <div id="p1-info" class="player-info">
                    <svg class="avatar-svg" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#3B82F6"/><path d="M20 10a6 6 0 100 12 6 6 0 000-12zm-9 22a9 9 0 0118 0v2H11v-2z" fill="#fff"/></svg>
                    <div class="player-details">
                        <span class="player-name" id="p1-name">Player 1</span>
                        <div class="ball-dots" id="p1-dots"></div>
                    </div>
                </div>
                
                <div id="turn-indicator">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 18l-8-8h16z"/></svg>
                </div>
                
                <div id="p2-info" class="player-info">
                    <div class="player-details right-align">
                        <span class="player-name" id="p2-name">Player 2</span>
                        <div class="ball-dots" id="p2-dots"></div>
                    </div>
                    <svg class="avatar-svg" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#EF4444"/><path d="M20 10a6 6 0 100 12 6 6 0 000-12zm-9 22a9 9 0 0118 0v2H11v-2z" fill="#fff"/></svg>
                </div>
            </div>
            
            <div class="bottom-controls shadow-lg">
                <button id="exit-game-btn" class="btn-icon-only">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
                <div id="ping-counter">Ping: <span id="ping-val">--</span>ms</div>
                <button id="fullscreen-btn" class="btn-icon-only">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M3 16v3a2 2 0 002 2h3"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MATCH INVITE TOAST -->
    <div id="invite-toast" class="toast hidden">
        <p id="invite-msg"></p>
        <button id="invite-accept" class="btn-primary btn-sm">Accept</button>
        <button id="invite-decline" class="btn-secondary btn-sm">Decline</button>
    </div>

    <!-- GAME OVER OVERLAY -->
    <div id="gameover-overlay" class="overlay hidden">
        <div class="overlay-card">
            <h2 id="gameover-title"></h2>
            <p id="gameover-reason"></p>
            <button id="gameover-lobby" class="btn-primary">Back to Lobby</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
